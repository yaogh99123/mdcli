version: 2

# 全局环境变量设置
env:
  - CGO_ENABLED=0
  - GOFLAGS=-mod=vendor
  - GO111MODULE=auto

# 构建配置
builds:
  - id: binary
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm
      - arm64
      - 386
    goarm:
      - 6
      - 7
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.buildSource=binaryRelease

# 归档配置 (已修复文件名冲突问题)
archives:
  - builds:
      - binary
    # 关键修改：当架构是 arm 时，自动添加 v6 或 v7 后缀
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    format_overrides:
      - goos: windows
        format: zip

# 校验码配置
checksum:
  name_template: "checksums.txt"

# 快照版本命名
snapshot:
  version_template: "{{ .Tag }}-next"

# Changelog 配置
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^bump"

# Homebrew 配置 (已更正为 v2 规范)
brews:
  - repository:
      owner: yaogh99123
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/yaogh99123/homebrew-tap/"
    description: "A simple terminal UI for docker, written in Go"
